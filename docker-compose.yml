
services:
  postgres:
    image: postgres:17-alpine
    container_name: blog_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: on-failure

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog_celery_worker
    command: bash -c "PYTHONPATH=/app celery -A worker.celery_app worker --loglevel=info --concurrency=2"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: on-failure

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog_celery_beat
    command: bash -c "PYTHONPATH=/app celery -A worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler"
    env_file:
      - ./backend/.env
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat-schedule
    restart: on-failure

  frontend:
    image: node:20-alpine
    container_name: blog_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
